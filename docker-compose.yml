version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_DATABASE=school_calendar
      - DB_USERNAME=root
      - DB_PASSWORD=
      - SESSION_DRIVER=file
      - TRUSTED_PROXIES=*
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    volumes:
      - ./storage:/var/www/storage
    networks:
      - laravel

volumes:
  mysql_data:

networks:
  laravel:
    driver: bridge